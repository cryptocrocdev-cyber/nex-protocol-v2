<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="space-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02041a"/>
      <stop offset="50%" stop-color="#060830"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>

    <!-- Core glow -->
    <radialGradient id="core-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8aafff" stop-opacity="0.003"/>
      <stop offset="30%" stop-color="#6c8cff" stop-opacity="0.0016"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Wraith void gradient -->
    <radialGradient id="wraith-void" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6c8cff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4.066666666666666" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gem">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur-large">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <!-- Animations -->
    <style>
      @keyframes pulse-core {
        0%, 100% { opacity: 0.306; }
        50% { opacity: 0.51; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes orbit-drift-0 { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.255; } }
      @keyframes orbit-drift-1 { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.20400000000000001; } }
      @keyframes orbit-drift-2 { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.18359999999999999; } }
      @keyframes gem-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }
      @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.6; } }
      .pulse { animation: pulse-core 3s ease-in-out infinite; }
      .pulse-fast { animation: pulse-core 1.8s ease-in-out infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      .orbit-0 { animation: orbit-drift-0 4s ease-in-out infinite; }
      .orbit-1 { animation: orbit-drift-1 5s ease-in-out infinite 0.6s; }
      .orbit-2 { animation: orbit-drift-2 6s ease-in-out infinite 1.2s; }
    </style>
  </defs>

